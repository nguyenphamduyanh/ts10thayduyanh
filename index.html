<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toán thầy Duy Anh - Ôn thi Tuyển sinh 10</title>
    
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$']],
                processEscapes: true,
                packages: {'[+]': ['ams']}
            },
            options: { renderActions: { addMenu: [] } },
            loader: { load: ['[tex]/ams'] },
            svg: { fontCache: 'global' }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">

    <style>
        :root { 
            --primary-gradient: linear-gradient(135deg, #FFD200 0%, #F7971E 100%);
            --secondary: #2563eb;
            --accent: #ef4444;
            --glass: rgba(255, 255, 255, 0.9);
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Montserrat', sans-serif; }
        
        body { 
            background: #f0f2f5 url('https://www.transparenttextures.com/patterns/mathematics.png'); 
            height: 100vh; display: flex; flex-direction: column; 
        }

        header { 
            background: var(--primary-gradient);
            padding: 25px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            z-index: 100;
        }

        header h1 { 
            font-family: 'Playfair Display', serif; 
            font-size: clamp(24px, 5vw, 36px); 
            color: #78350f;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 5px;
        }

        .subtitle { 
            font-size: clamp(14px, 3vw, 20px); 
            font-weight: 800; 
            color: #b45309;
            background: rgba(255,255,255,0.3);
            display: inline-block;
            padding: 5px 20px;
            border-radius: 50px;
            backdrop-filter: blur(5px);
            margin-top: 10px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

        .main-container { display: flex; flex: 1; overflow: hidden; padding: 20px; gap: 20px; }

        nav { 
            width: 320px; background: var(--glass); backdrop-filter: blur(10px);
            border-radius: 20px; padding: 25px; 
            box-shadow: 0 8px 32px rgba(31, 38, 135, 0.1);
            display: flex; flex-direction: column; gap: 20px;
        }

        .select-group label { font-weight: 700; color: #475569; font-size: 13px; text-transform: uppercase; }
        
        select { 
            width: 100%; padding: 12px; border-radius: 12px; border: 2px solid #e2e8f0;
            background: white; font-weight: 600; outline: none; transition: 0.3s;
        }
        select:focus { border-color: var(--secondary); box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1); }

        .grid-questions { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        
        .q-btn { 
            padding: 15px; background: white; border-radius: 15px; border: 1px solid #e2e8f0;
            text-align: center; cursor: pointer; font-weight: 700; transition: 0.3s;
        }
        .q-btn:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .q-btn.active { background: var(--secondary); color: white; border-color: var(--secondary); }

        article { 
            flex: 1; background: var(--glass); backdrop-filter: blur(10px);
            border-radius: 20px; padding: 40px; overflow-y: auto;
            box-shadow: 0 8px 32px rgba(31, 38, 135, 0.1);
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .problem-text { font-size: 1.2rem; font-weight: 700; line-height: 1.8; color: #1e293b; margin-bottom: 30px; text-align: left; }

        .solution-card { 
            background: white; border-radius: 15px; padding: 35px;
            border-left: 8px solid #10b981; box-shadow: 0 4px 6px rgba(0,0,0,0.02); text-align: left;
        }

        .sol-header { color: #10b981; font-weight: 800; font-size: 1.3rem; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }

        .contact-fixed { position: fixed; bottom: 40px; right: 40px; display: flex; flex-direction: column; align-items: flex-end; gap: 15px; z-index: 1000; }
        
        .btn-circle { 
            width: 75px; height: 75px; border-radius: 50%; display: flex; justify-content: center; align-items: center;
            color: white; font-size: 35px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); transition: 0.3s; text-decoration: none;
        }
        .btn-zalo { background: #0068ff; }
        .btn-fb { background: #0084ff; }
        .btn-toggle { 
            background: var(--accent); width: auto; padding: 0 35px; border-radius: 50px; 
            height: 75px; font-weight: 800; font-size: 20px; border: none; cursor: pointer; color: white;
        }
        .btn-circle:hover { transform: scale(1.1) rotate(5deg); }

        @media (max-width: 768px) {
            .main-container { flex-direction: column; padding: 10px; }
            nav { width: 100%; }
            .contact-fixed { bottom: 20px; right: 20px; }
            .btn-circle { width: 60px; height: 60px; font-size: 28px; }
            .btn-toggle { height: 60px; padding: 0 25px; font-size: 16px; }
        }
    </style>
</head>
<body>

<header>
    <h1>🎓 Toán Thầy Duy Anh</h1>
    <div class="subtitle">Hệ thống hỗ trợ ôn tập Tuyển sinh 10</div>
</header>

<div class="main-container">
    <nav>
        <div class="select-group">
            <label><i class="fas fa-layer-group"></i> Chọn Cụm</label>
            <select id="cumSelect" onchange="updateExams()"></select>
        </div>
        <div class="select-group">
            <label><i class="fas fa-file-alt"></i> Chọn Đề</label>
            <select id="deSelect" onchange="renderQuestionList()"></select>
        </div>
        <div class="grid-questions" id="qList"></div>
    </nav>

    <article id="displayArea">
        <div style="text-align: center; padding-top: 100px; color: #94a3b8;">
            <i class="fas fa-microscope" style="font-size: 80px; opacity: 0.2;"></i>
            <p style="margin-top: 20px; font-weight: 600;">Chọn bài tập để bắt đầu ôn tập nhé các em!</p>
        </div>
    </article>
</div>

<div class="contact-fixed">
    <div id="socialButtons" style="display: none; flex-direction: column; gap: 15px;">
        <a href="https://zalo.me/0908734026" target="_blank" class="btn-circle btn-zalo"><i class="fas fa-comment-dots"></i></a>
        <a href="https://m.me/duyanhnp.0910" target="_blank" class="btn-circle btn-fb"><i class="fab fa-facebook-messenger"></i></a>
    </div>
    <button class="btn-toggle" onclick="toggleSocial()">
        <i class="fas fa-headset"></i> Hỏi bài thầy
    </button>
</div>

<script>
    let rawData = [];

    Papa.parse("data.csv", {
        download: true, header: true, skipEmptyLines: true,
        complete: function(results) {
            rawData = results.data;
            initDropdowns();
        }
    });

    function initDropdowns() {
        const cumSet = [...new Set(rawData.map(item => item.Cum))];
        const cumSelect = document.getElementById('cumSelect');
        cumSelect.innerHTML = cumSet.map(c => `<option value="${c}">Cụm ${c}</option>`).join('');
        updateExams();
    }

    function updateExams() {
        const selectedCum = document.getElementById('cumSelect').value;
        const deSet = [...new Set(rawData.filter(item => item.Cum == selectedCum).map(item => item.De))];
        const deSelect = document.getElementById('deSelect');
        deSelect.innerHTML = deSet.map(d => `<option value="${d}">Đề số ${d}</option>`).join('');
        renderQuestionList();
    }

    function renderQuestionList() {
        const qList = document.getElementById('qList');
        qList.innerHTML = "";
        for(let i=1; i<=7; i++) {
            const btn = document.createElement('div');
            btn.className = 'q-btn';
            btn.innerText = `Bài ${i}`;
            btn.onclick = function() {
                document.querySelectorAll('.q-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                showDetail(`Bài ${i}`);
            };
            qList.appendChild(btn);
        }
    }

    function showDetail(bai) {
        const cum = document.getElementById('cumSelect').value;
        const de = document.getElementById('deSelect').value;
        const found = rawData.find(item => item.Cum == cum && item.De == de && item.Cau.trim() == bai);

        const area = document.getElementById('displayArea');
        if(found) {
            // Xử lý đề bài: Xóa điểm, cắt xuống hàng cho câu a, b, c
            let processedDe = found.De_Bai
                .replace(/^\s*[\.\-\+]*\s*/, '')
                .replace(/^\(\s*[\d\,\.]+\s*điểm\s*\)\s*/i, '')
                .replace(/(?:\s+|^)([a-e][\)\.])\s/g, '<br><br><span style="color:var(--secondary); font-weight:800;">$1</span> ');

            // --- THUẬT TOÁN ĐỘI MŨ TỰ ĐỘNG CHO GÓC ---
            let processedLg = found.Loi_Giai;
            
            // 1. Nếu thầy lỡ gõ \hat thì tự chuyển thành \widehat
            processedLg = processedLg.replace(/\\hat\{([A-Z]{3})\}/g, '\\widehat{$1}');
            
            // 2. Tự động tìm 3 chữ in hoa đứng trước dấu =, +, -, <, > để đội mũ (Né Tam giác)
            processedLg = processedLg.replace(/(\\triangle\s*|\\Delta\s*)?\b([A-Z]{3})\b(\s*(=|\+|-|<|>))/g, function(match, isTriangle, baChuCai, dauToanHoc) {
                if (isTriangle) return match; // Nếu có ký hiệu tam giác phía trước -> Giữ nguyên
                return '\\widehat{' + baChuCai + '}' + dauToanHoc; // Đội mũ
            });

            // 3. Tự động tìm 3 chữ in hoa đứng sau dấu =, +, -, <, > để đội mũ
            processedLg = processedLg.replace(/(=|\+|-|<|>)(\s*)(\\triangle\s*|\\Delta\s*)?\b([A-Z]{3})\b/g, function(match, dauToanHoc, khoangCach, isTriangle, baChuCai) {
                if (isTriangle) return match; 
                return dauToanHoc + khoangCach + '\\widehat{' + baChuCai + '}';
            });

            // Sau khi chỉnh LaTeX xong mới biến \n thành <br> để xuống hàng
            processedLg = processedLg.replace(/\n/g, '<br>');

            area.innerHTML = `
                <div style="animation: fadeIn 0.4s ease">
                    <h2 style="font-family:'Playfair Display'; font-size: 32px; color:var(--secondary); margin-bottom:20px;">${bai}</h2>
                    <div class="problem-text">${processedDe}</div>
                    ${found.Link_Anh ? `<img src="${found.Link_Anh}" style="margin: 25px 0; max-width: 100%; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1);">` : ""}
                    <div class="solution-card">
                        <div class="sol-header"><i class="fas fa-lightbulb"></i> HƯỚNG DẪN GIẢI CHI TIẾT</div>
                        <div style="line-height:2; color:#334155; font-size:1.1rem;">
                            ${processedLg}
                        </div>
                    </div>
                </div>
            `;
            MathJax.typesetPromise();
        } else {
            area.innerHTML = `<div style="text-align:center; padding-top:100px;">🔔 Bài này thầy đang cập nhật dữ liệu...</div>`;
        }
    }

    function toggleSocial() {
        const s = document.getElementById('socialButtons');
        s.style.display = s.style.display === 'none' ? 'flex' : 'none';
    }
</script>
</body>
</html>
