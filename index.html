<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toán thầy Duy Anh - Ôn thi Tuyển sinh 10</title>
    
    <script>
        window.MathJax = {
            tex: { inlineMath: [['$', '$'], ['\\(', '\\)']], displayMath: [['$$', '$$']], processEscapes: true },
            options: { renderActions: { addMenu: [] } },
            svg: { fontCache: 'global' }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">

    <style>
        :root { 
            --primary-gradient: linear-gradient(135deg, #FFD200 0%, #F7971E 100%);
            --secondary: #2563eb; --accent: #ef4444; --glass: rgba(255, 255, 255, 0.9);
            --success: #10b981;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Montserrat', sans-serif; scroll-behavior: smooth; }
        body { background: #f0f2f5 url('https://www.transparenttextures.com/patterns/graphy.png'); height: 100vh; display: flex; flex-direction: column; }

        /* --- HEADER CÁ NHÂN HÓA --- */
        header { 
            background: var(--primary-gradient); 
            padding: 45px 20px; 
            text-align: center; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.15); 
            z-index: 100;
            position: relative;
            overflow: hidden;
        }
        header::before { content: "Σ √ π ∞"; position: absolute; top: 15px; left: 30px; font-size: 35px; color: rgba(255, 255, 255, 0.15); font-family: serif; }
        header::after { content: "f(x) = ax² + bx + c"; position: absolute; bottom: 15px; right: 30px; font-size: 18px; color: rgba(255, 255, 255, 0.15); font-weight: 800; }

        header h1 { 
            font-family: 'Playfair Display', serif; 
            font-size: clamp(26px, 6vw, 45px); 
            color: #78350f; 
            text-transform: uppercase; 
            letter-spacing: 3px;
            margin-bottom: 5px;
            animation: slideDown 0.8s ease-out;
        }
        .personal-slogan { color: #854d0e; font-weight: 700; font-style: italic; font-size: 14px; margin-bottom: 10px; opacity: 0.8; }

        .subtitle { 
            font-size: clamp(13px, 3.5vw, 17px); 
            font-weight: 800; 
            color: #fff;
            background: rgba(0,0,0,0.15);
            display: inline-block; 
            padding: 8px 25px; 
            border-radius: 50px; 
            border: 1px solid rgba(255,255,255,0.4);
            animation: fadeInScale 1s ease-out 0.5s both, shimmer 4s infinite alternate;
        }

        @keyframes slideDown { from { opacity: 0; transform: translateY(-30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeInScale { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }
        @keyframes shimmer {
            0% { box-shadow: 0 0 10px #ef4444; }
            50% { box-shadow: 0 0 20px #2563eb; }
            100% { box-shadow: 0 0 25px #f7971e; transform: scale(1.03); }
        }

        .main-container { display: flex; flex: 1; overflow: hidden; padding: 20px; gap: 20px; }

        /* --- SIDEBAR --- */
        nav { width: 320px; background: var(--glass); backdrop-filter: blur(10px); border-radius: 20px; padding: 25px; box-shadow: 0 8px 32px rgba(31, 38, 135, 0.08); display: flex; flex-direction: column; gap: 20px; }
        .select-group label { font-size: 11px; font-weight: 800; color: #64748b; letter-spacing: 1px; display: block; margin-bottom: 8px; }
        select { width: 100%; padding: 12px; border-radius: 12px; border: 2px solid #e2e8f0; font-weight: 600; outline: none; transition: 0.3s; background: white; }
        select:focus { border-color: var(--secondary); }

        .grid-questions { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .q-btn { 
            padding: 14px 5px; background: white; border-radius: 12px; border: 2px solid #f1f5f9; 
            text-align: center; cursor: pointer; font-weight: 700; transition: all 0.3s; color: #475569;
        }
        .q-btn:hover { border-color: var(--secondary); background: #f8fafc; transform: translateY(-2px); }
        .q-btn.active { 
            background: var(--secondary); color: white; border-color: var(--secondary); 
            transform: scale(1.05); box-shadow: 0 5px 15px rgba(37, 99, 235, 0.3);
        }

        /* --- NỘI DUNG BÀI GIẢI (SOLUTION CARD) --- */
        article { flex: 1; background: var(--glass); backdrop-filter: blur(10px); border-radius: 25px; padding: 35px; overflow-y: auto; box-shadow: 0 8px 32px rgba(31, 38, 135, 0.08); }
        
        .problem-title { font-family: 'Playfair Display', serif; font-size: 32px; color: var(--secondary); margin-bottom: 20px; border-bottom: 3px solid #f1f5f9; padding-bottom: 10px; display: flex; align-items: center; gap: 15px; }
        
        .problem-text { font-size: 1.15rem; font-weight: 600; line-height: 1.8; color: #1e293b; margin-bottom: 30px; padding: 0 5px; }
        
        .solution-card { 
            background: white; 
            border-radius: 18px; 
            padding: 25px; 
            border-left: 8px solid var(--success); 
            box-shadow: 0 10px 25px rgba(0,0,0,0.03);
            margin-top: 20px;
            animation: slideUp 0.5s ease-out;
        }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .sol-header { color: var(--success); font-weight: 800; font-size: 1.2rem; margin-bottom: 18px; display: flex; align-items: center; gap: 12px; text-transform: uppercase; letter-spacing: 1px; }
        .sol-content { line-height: 2; color: #334155; font-size: 1.05rem; font-weight: 500; }

        .math-image { margin: 25px auto; max-width: 100%; display: block; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }

        /* Nút liên hệ */
        .contact-fixed { position: fixed; bottom: 30px; right: 30px; z-index: 1000; }
        .btn-ask { background: var(--accent); color: white; padding: 15px 30px; border-radius: 50px; font-weight: 800; border: none; cursor: pointer; box-shadow: 0 10px 25px rgba(239, 68, 68, 0.3); display: flex; align-items: center; gap: 10px; transition: 0.3s; text-decoration: none; }
        .btn-ask:hover { transform: scale(1.05); background: #dc2626; }

        @media (max-width: 768px) {
            .main-container { flex-direction: column; padding: 15px; }
            nav { width: 100%; }
            .grid-questions { grid-template-columns: repeat(4, 1fr); }
            article { padding: 25px; }
        }
    </style>
</head>
<body>

<header>
    <div class="personal-slogan">"Học toán không khó, đã có thầy Duy Anh"</div>
    <h1>🎓 Toán Thầy Duy Anh</h1>
    <div class="subtitle">Hệ thống hỗ trợ ôn tập Tuyển sinh 10</div>
</header>

<div class="main-container">
    <nav id="sidebar">
        <div style="display: flex; gap: 12px;">
            <div class="select-group" style="flex: 1;">
                <label>CỤM BÀI</label>
                <select id="cumSelect" onchange="updateExams()"></select>
            </div>
            <div class="select-group" style="flex: 1;">
                <label>ĐỀ SỐ</label>
                <select id="deSelect" onchange="renderQuestionList()"></select>
            </div>
        </div>
        <div class="grid-questions" id="qList"></div>
    </nav>

    <article id="displayArea">
        <div style="text-align: center; padding-top: 100px; color: #94a3b8;">
            <i class="fas fa-lightbulb" style="font-size: 80px; opacity: 0.15; margin-bottom: 25px;"></i>
            <h3 style="color: #64748b; margin-bottom: 10px;">Chào em, thầy Duy Anh đây!</h3>
            <p style="font-weight: 600;">Hãy chọn bài tập bên trái để xem hướng dẫn giải chi tiết nhé.</p>
        </div>
    </article>
</div>

<div class="contact-fixed">
    <a href="https://zalo.me/0908734026" target="_blank" class="btn-ask">
        <i class="fab fa-facebook-messenger"></i> Hỏi bài thầy Duy Anh
    </a>
</div>

<script>
    let rawData = [];
    // Cập nhật đúng Repo theo ảnh bạn gửi
    const GITHUB_USER = "nguyenphamduyanh"; 
    const GITHUB_REPO = "ts10thayduyanh";
    const IMAGE_BASE_URL = `https://raw.githubusercontent.com/${GITHUB_USER}/${GITHUB_REPO}/main/`;

    Papa.parse("data.csv", {
        download: true, header: true, skipEmptyLines: true,
        complete: function(results) {
            rawData = results.data;
            initDropdowns();
        }
    });

    function initDropdowns() {
        const cumSet = [...new Set(rawData.map(item => item.Cum))];
        const cumSelect = document.getElementById('cumSelect');
        cumSelect.innerHTML = cumSet.map(c => `<option value="${c}">Cụm ${c}</option>`).join('');
        updateExams();
    }

    function updateExams() {
        const selectedCum = document.getElementById('cumSelect').value.replace('Cụm ', '');
        const deSet = [...new Set(rawData.filter(item => item.Cum == selectedCum).map(item => item.De))];
        const deSelect = document.getElementById('deSelect');
        deSelect.innerHTML = deSet.map(d => `<option value="${d}">Đề số ${d}</option>`).join('');
        renderQuestionList();
    }

    function renderQuestionList() {
        const qList = document.getElementById('qList');
        qList.innerHTML = "";
        for(let i=1; i<=7; i++) {
            const btn = document.createElement('div');
            btn.className = 'q-btn'; 
            btn.innerText = `Bài ${i}`; 
            btn.onclick = function() {
                document.querySelectorAll('.q-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                showDetail(`Bài ${i}`);
            };
            qList.appendChild(btn);
        }
    }

    function showDetail(bai) {
        const cum = document.getElementById('cumSelect').value.replace('Cụm ', '');
        const de = document.getElementById('deSelect').value.replace('Đề số ', '');
        const found = rawData.find(item => item.Cum == cum && item.De == de && item.Cau.trim() == bai);
        const area = document.getElementById('displayArea');

        if(found) {
            let imgTag = "";
            if(found.Link_Anh && found.Link_Anh.trim() !== "") {
                // Tự động sửa lỗi tên file từ 'h' sang 'c' nếu cần để khớp với GitHub của bạn
                let path = found.Link_Anh;
                const fullPath = path.startsWith('http') ? path : IMAGE_BASE_URL + path;
                imgTag = `<img src="${fullPath}" class="math-image" onerror="this.src='${fullPath.replace('/h1', '/c1')}'">`;
            }

            const applyAutoHat = (t) => {
                if(!t) return "";
                t = t.replace(/\\hat\{([A-Z]{3})\}/g, '\\widehat{$1}');
                t = t.replace(/(góc\s+)\b([A-Z]{3})\b/gi, '$1\\widehat{$2}');
                return t;
            };

            let pDe = applyAutoHat(found.De_Bai).replace(/\n/g, '<br>');
            let pLg = applyAutoHat(found.Loi_Giai).replace(/\n/g, '<br>');

            area.innerHTML = `
                <div class="problem-title">
                    <i class="fas fa-edit"></i> ${bai}
                </div>
                <div class="problem-text">${pDe}</div>
                ${imgTag}
                <div class="solution-card">
                    <div class="sol-header">
                        <i class="fas fa-lightbulb"></i> Hướng dẫn giải chi tiết
                    </div>
                    <div class="sol-content">${pLg}</div>
                </div>
            `;
            MathJax.typesetPromise();
        }
    }

    function toggleSocial() {
        const s = document.getElementById('socialButtons');
        s.style.display = s.style.display === 'none' ? 'flex' : 'none';
    }
</script>
</body>
</html>
