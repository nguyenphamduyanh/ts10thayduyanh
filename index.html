<!-- Duy Anh hãy copy toàn bộ đoạn này và cập nhật vào index.html nhé -->
<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toán thầy Duy Anh - Ôn thi Tuyển sinh 10</title>
    
    <script>
        window.MathJax = {
            tex: { inlineMath: [['$', '$'], ['\\(', '\\)']], displayMath: [['$$', '$$']], processEscapes: true },
            options: { renderActions: { addMenu: [] } },
            svg: { fontCache: 'global' }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">

    <style>
        :root { 
            --primary-gradient: linear-gradient(135deg, #FFD200 0%, #F7971E 100%);
            --secondary: #2563eb; --accent: #ef4444; --glass: rgba(255, 255, 255, 0.9);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Montserrat', sans-serif; scroll-behavior: smooth; }
        
        /* Background Pattern cho toàn trang */
        body { 
            background: #f0f2f5 url('https://www.transparenttextures.com/patterns/graphy.png'); 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
        }

        /* TRANG TRÍ HEADER MỚI */
        header { 
            background: var(--primary-gradient); 
            padding: 40px 20px; 
            text-align: center; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
            z-index: 100;
            position: relative;
            overflow: hidden;
        }

        /* Thêm các icon toán học bay lơ lửng ở header */
        header::before {
            content: "Σ  √  π  ∞";
            position: absolute;
            top: 10px;
            left: 20px;
            font-size: 40px;
            color: rgba(255, 255, 255, 0.2);
            font-family: serif;
        }
        header::after {
            content: "y = ax + b";
            position: absolute;
            bottom: 10px;
            right: 20px;
            font-size: 20px;
            color: rgba(255, 255, 255, 0.2);
            font-weight: 800;
        }

        header h1 { 
            font-family: 'Playfair Display', serif; 
            font-size: clamp(24px, 6vw, 42px); 
            color: #78350f; 
            text-transform: uppercase; 
            letter-spacing: 3px;
            animation: slideDown 0.8s ease-out;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        .subtitle { 
            font-size: clamp(14px, 3.5vw, 18px); 
            font-weight: 800; 
            color: #fff;
            display: inline-block; 
            padding: 8px 25px; 
            border-radius: 50px; 
            margin-top: 15px;
            text-shadow: 0 1px 3px rgba(0,0,0,0.3);
            border: 2px solid rgba(255,255,255,0.5);
            animation: fadeInScale 1s ease-out 0.5s both, shimmer 4s infinite alternate;
        }

        @keyframes slideDown { from { opacity: 0; transform: translateY(-30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeInScale { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }
        @keyframes shimmer {
            0% { background: rgba(239, 68, 68, 0.6); box-shadow: 0 0 10px #ef4444; }
            50% { background: rgba(37, 99, 235, 0.6); box-shadow: 0 0 20px #2563eb; }
            100% { background: rgba(247, 151, 30, 0.7); box-shadow: 0 0 25px #f7971e; transform: scale(1.05); }
        }

        .main-container { display: flex; flex: 1; overflow: hidden; padding: 20px; gap: 20px; }

        nav { width: 320px; background: var(--glass); backdrop-filter: blur(10px); border-radius: 20px; padding: 20px; box-shadow: 0 8px 32px rgba(31, 38, 135, 0.1); display: flex; flex-direction: column; gap: 15px; }
        
        .grid-questions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .q-btn { 
            padding: 12px 5px; background: white; border-radius: 12px; border: 2px solid #f1f5f9; 
            text-align: center; cursor: pointer; font-weight: 700; transition: all 0.3s;
            color: #475569;
        }
        .q-btn.active { 
            background: var(--secondary); color: white; border-color: var(--secondary); 
            transform: scale(1.08); box-shadow: 0 5px 15px rgba(37, 99, 235, 0.4);
        }

        article { flex: 1; background: var(--glass); backdrop-filter: blur(10px); border-radius: 20px; padding: 30px; overflow-y: auto; box-shadow: 0 8px 32px rgba(31, 38, 135, 0.1); }
        
        /* Hiệu ứng mượt cho ảnh */
        .math-image {
            margin: 20px auto;
            max-width: 100%;
            display: block;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
            transition: transform 0.3s ease;
        }
        .math-image:hover { transform: scale(1.02); }

        .contact-fixed { position: fixed; bottom: 30px; right: 30px; display: flex; flex-direction: column; align-items: flex-end; gap: 12px; z-index: 1000; }
        .btn-toggle { background: var(--accent); padding: 0 25px; border-radius: 50px; height: 60px; font-weight: 800; border: none; cursor: pointer; color: white; box-shadow: 0 8px 20px rgba(239, 68, 68, 0.3); }

        @media (max-width: 768px) {
            .main-container { flex-direction: column; padding: 10px; overflow-y: auto; }
            nav { width: 100%; }
            .grid-questions { grid-template-columns: repeat(4, 1fr); }
        }
    </style>
</head>
<body>

<header>
    <h1>🎓 Toán Thầy Duy Anh</h1>
    <div class="subtitle">Hệ thống hỗ trợ ôn tập Tuyển sinh 10</div>
</header>

<div class="main-container">
    <nav id="sidebar">
        <div style="display: flex; gap: 10px;">
            <div class="select-group" style="flex: 1;">
                <label style="font-size: 11px; font-weight: 800; color: #64748b;">CỤM BÀI</label>
                <select id="cumSelect" onchange="updateExams()" style="width: 100%; padding: 10px; border-radius: 10px; border: 2px solid #e2e8f0;"></select>
            </div>
            <div class="select-group" style="flex: 1;">
                <label style="font-size: 11px; font-weight: 800; color: #64748b;">ĐỀ SỐ</label>
                <select id="deSelect" onchange="renderQuestionList()" style="width: 100%; padding: 10px; border-radius: 10px; border: 2px solid #e2e8f0;"></select>
            </div>
        </div>
        <div class="grid-questions" id="qList"></div>
    </nav>

    <article id="displayArea">
        <div style="text-align: center; padding-top: 100px; color: #94a3b8;">
            <i class="fas fa-pencil-ruler" style="font-size: 60px; opacity: 0.2; margin-bottom: 20px;"></i>
            <p style="font-weight: 600;">Chào Duy Anh! Hãy chọn một bài tập để bắt đầu ôn luyện.</p>
        </div>
    </article>
</div>

<div class="contact-fixed">
    <div id="socialButtons" style="display: none; flex-direction: column; gap: 12px; margin-bottom: 12px;">
        <a href="https://zalo.me/0908734026" target="_blank" style="width: 55px; height: 55px; background: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 10px rgba(0,0,0,0.1);">
            <img src="https://upload.wikimedia.org/wikipedia/commons/9/91/Icon_of_Zalo.svg" style="width: 35px;">
        </a>
    </div>
    <button class="btn-toggle" onclick="toggleSocial()">
        <i class="fas fa-comments"></i> Hỏi bài Thầy
    </button>
</div>

<script>
    let rawData = [];

    // --- CẬP NHẬT THÔNG TIN CỦA BẠN TẠI ĐÂY ---
    const GITHUB_USER = "nguyenphamduyanh"; 
    const GITHUB_REPO = "ts10thayduyanh";
    const IMAGE_BASE_URL = `https://raw.githubusercontent.com/${GITHUB_USER}/${GITHUB_REPO}/main/`;

    Papa.parse("data.csv", {
        download: true, header: true, skipEmptyLines: true,
        complete: function(results) {
            rawData = results.data;
            initDropdowns();
        }
    });

    function initDropdowns() {
        const cumSet = [...new Set(rawData.map(item => item.Cum))];
        const cumSelect = document.getElementById('cumSelect');
        cumSelect.innerHTML = cumSet.map(c => `<option value="${c}">${c}</option>`).join('');
        updateExams();
    }

    function updateExams() {
        const selectedCum = document.getElementById('cumSelect').value;
        const deSet = [...new Set(rawData.filter(item => item.Cum == selectedCum).map(item => item.De))];
        const deSelect = document.getElementById('deSelect');
        deSelect.innerHTML = deSet.map(d => `<option value="${d}">Đề ${d}</option>`).join('');
        renderQuestionList();
    }

    function renderQuestionList() {
        const qList = document.getElementById('qList');
        qList.innerHTML = "";
        for(let i=1; i<=7; i++) {
            const btn = document.createElement('div');
            btn.className = 'q-btn'; 
            btn.innerText = `Bài ${i}`; 
            btn.onclick = function() {
                document.querySelectorAll('.q-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                showDetail(`Bài ${i}`);
            };
            qList.appendChild(btn);
        }
    }

    function showDetail(bai) {
        const cum = document.getElementById('cumSelect').value;
        const de = document.getElementById('deSelect').value;
        const found = rawData.find(item => item.Cum == cum && item.De == de && item.Cau.trim() == bai);
        const area = document.getElementById('displayArea');

        if(found) {
            let imgTag = "";
            if(found.Link_Anh && found.Link_Anh.trim() !== "") {
                const fullPath = found.Link_Anh.startsWith('http') ? found.Link_Anh : IMAGE_BASE_URL + found.Link_Anh;
                imgTag = `<img src="${fullPath}" class="math-image" onerror="this.style.display='none'">`;
            }

            area.innerHTML = `
                <div style="animation: fadeIn 0.5s ease">
                    <h2 style="font-family:'Playfair Display'; font-size: 30px; color:var(--secondary); margin-bottom:20px; border-bottom: 2px solid #eee; padding-bottom: 10px;">${bai}</h2>
                    <div style="font-size: 1.2rem; font-weight: 700; color: #1e293b; margin-bottom: 25px;">${found.De_Bai}</div>
                    ${imgTag}
                    <div class="solution-card" style="margin-top: 30px;">
                        <div class="sol-header"><i class="fas fa-lightbulb"></i> LỜI GIẢI CHI TIẾT</div>
                        <div style="line-height:2; color:#334155;">${found.Loi_Giai.replace(/\n/g, '<br>')}</div>
                    </div>
                </div>
            `;
            MathJax.typesetPromise();
        }
    }

    function toggleSocial() {
        const s = document.getElementById('socialButtons');
        s.style.display = s.style.display === 'none' ? 'flex' : 'none';
    }
</script>
</body>
</html>
